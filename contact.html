<style>
    /* Contact Form Styling */
    .card form input,
    .card form textarea,
    .card form button {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .card form input:focus,
    .card form textarea:focus {
        outline: none;
        border-color: #0a192f;
    }

    .card form textarea {
        resize: none;
        height: 100px;
    }

    .card form button {
        background: #0a192f;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 15px;
        font-weight: bold;
        transition: 0.3s;
    }

    .card form button:hover {
        background: #64ffda;
        color: black;
    }
</style>
```

    <h2>Contact Us</h2>

<div class="container">

```
<div class="card">

    <form action="https://formsubmit.co/hr@clusterconnectsolutions.com" method="POST">

        <!-- Disable captcha -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Redirect after submit -->
        <input type="hidden" name="_next" value="https://clusterconnectsolutions.com/thankyou.html">

        <label>Name:</label><br>
        <input type="text" name="name" placeholder="Enter your name" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email" required><br><br>

        <label>Phone:</label><br>
        <input type="tel" name="phone" placeholder="Enter your phone number" required><br><br>

        <label>Message (Optional):</label><br>
        <textarea name="message" placeholder="Tell us which service you're interested in (Training, Internship, Placement, etc.)"></textarea><br><br>

        <button type="submit">Submit</button>

    </form>

</div>
```

</div>
