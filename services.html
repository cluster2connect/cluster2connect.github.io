<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    header {
      background: #0f172a;
      padding: 15px;
    }

    header a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    header a:hover {
      color: #38bdf8;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      color: #38bdf8;
      font-size: 36px;
    }

    p {
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 20px;
      background: #38bdf8;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="trainings.html">Trainings</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</header>

<div class="container">
  <h1 id="service-title"></h1>
  <p id="service-desc"></p>

  <div id="extra"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const service = params.get("service");

const data = {
  internship: {
    title: "Internship",
    desc: "We offer expert guidance to help students secure premium internship opportunities. We provide mentorship, resume building, and interview preparation."
  },
  trainings: {
    title: "Trainings",
    desc: "Industry-focused training programs in Python, Java, AWS, Azure, DevOps, AI, ML and more.",
    extra: '<a href="trainings.html" class="btn">Click here for Courses and Trainings</a>'
  },
  project: {
    title: "Project",
    desc: "Work on real-time industry projects with expert mentorship and hands-on experience."
  },
  career: {
    title: "Career Building",
    desc: "We guide students with resume building, mock interviews, and career roadmaps."
  },
  sourcing: {
    title: "Sourcing & Recruitment",
    desc: "We connect companies with top talent through efficient hiring solutions."
  },
  placement: {
    title: "Placement",
    desc: "We assist students in securing placements with top companies."
  }
};

if (service && data[service]) {
  document.getElementById("service-title").innerText = data[service].title;
  document.getElementById("service-desc").innerText = data[service].desc;

  if (data[service].extra) {
    document.getElementById("extra").innerHTML = data[service].extra;
  }

} else {
  document.getElementById("service-title").innerText = "Our Services";

  document.getElementById("service-desc").innerHTML = `
    <br><br>
    <a href="services.html?service=internship">Internship</a><br><br>
    <a href="services.html?service=trainings">Trainings</a><br><br>
    <a href="services.html?service=project">Project</a><br><br>
    <a href="services.html?service=career">Career Building</a><br><br>
    <a href="services.html?service=sourcing">Sourcing & Recruitment</a><br><br>
    <a href="services.html?service=placement">Placement</a>
  `;
}
</script>

</body>
</html>
