<!DOCTYPE html>
<html>
<head>
  <title>Services - Cluster Connect</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px;
    }

    h1 {
      color: #38bdf8;
    }

    p {
      line-height: 1.7;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<header>
  <h2>Our Services</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="trainings.html">Trainings</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <h1 id="title"></h1>
  <p id="content"></p>

  <!-- Button container -->
  <div id="extraBtn"></div>

</div>

<script>
  const services = {

    internship: {
      title: "Internship",
      content: `We offer expert guidance to help students secure premium internship opportunities. Our structured program bridges academics and industry demands with mentorship, resume building, and interview preparation.`
    },

    trainings: {
      title: "Trainings",
      content: `We offer comprehensive, industry-aligned training programs to fast-track your tech career. Learn Python, Java, Cloud, Web Development and more with real-world projects and expert mentors.`
    },

    project: {
      title: "Project",
      content: `We provide complete guidance for final year projects with real-world implementation, documentation, and viva preparation.`
    },

    career: {
      title: "Career Building",
      content: `We help you build a strong career with resume building, mock interviews, networking strategies, and career guidance.`
    },

    recruitment: {
      title: "Sourcing and Recruitment",
      content: `We provide end-to-end recruitment solutions including sourcing, screening, and onboarding for top IT companies.`
    },

    placement: {
      title: "Placement",
      content: `We offer placement support including aptitude training, interview prep, and job referrals to help you secure your dream job.`
    }
  };

  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");

  const titleEl = document.getElementById("title");
  const contentEl = document.getElementById("content");
  const btnContainer = document.getElementById("extraBtn");

  if (services[type]) {
    titleEl.innerText = services[type].title;
    contentEl.innerText = services[type].content;

    // 👉 Show button ONLY for trainings
    if (type === "trainings") {
      btnContainer.innerHTML = `
        <button onclick="goToTrainingPage()">
          Click here for Courses and Trainings
        </button>
      `;
    }

  } else {
    titleEl.innerText = "Service Not Found";
    contentEl.innerText = "Please select a valid service.";
  }

  function goToTrainingPage() {
    window.location.href = "trainings.html";
  }
</script>

</body>
</html>
