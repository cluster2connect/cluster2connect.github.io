<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cluster Connect Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      background: #0f172a;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      color: #38bdf8;
      margin: 0;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      color: #38bdf8;
    }

    .services {
      padding: 50px 20px;
      text-align: center;
    }

    .services h2 {
      color: #38bdf8;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 40px;
    }

    .card {
      background: #111827;
      padding: 40px 20px;
      border-radius: 14px;
      transition: 0.3s;
      text-decoration: none;
      color: white;
      display: block;
      cursor: pointer;
    }

    .card h3 {
      margin: 0;
      font-size: 20px;
    }

    .card:hover {
      transform: translateY(-8px);
      background: #1f2937;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<header>
  <h2>Cluster Connect</h2>
  <nav>

    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Build Your Career With Us</h1>
  <p>Trainings | Internships | Projects | Placements</p>
</section>

<section class="services">
  <h2>Our Services</h2>

  <div class="service-grid">

    <a href="services.html?service=internship" class="card">
      <h3>Internship</h3>
    </a>

    <a href="services.html?service=trainings" class="card">
      <h3>Trainings</h3>
    </a>

    <a href="services.html?service=project" class="card">
      <h3>Project</h3>
    </a>

    <a href="services.html?service=career" class="card">
      <h3>Career Building</h3>
    </a>

    <a href="services.html?service=sourcing" class="card">
      <h3>Sourcing & Recruitment</h3>
    </a>

    <a href="services.html?service=placement" class="card">
      <h3>Placement</h3>
    </a>

  </div>
</section>

<footer>
  <p>© 2026 Cluster Connect Solutions</p>
</footer>

</body>
</html>
