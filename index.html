<!DOCTYPE html>
<html>
<head>
  <title>Cluster Connect Solutions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .services-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .service-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .service-card:hover {
      background: #334155;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<header>
  <h1>Cluster Connect Solutions</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="trainings.html">Trainings</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section id="home">
  <h2>Welcome</h2>
  <p>Your gateway to training, internships, and placements</p>
</section>

<section id="services">
  <h2>Our Services</h2>

  <div class="services-container">

    <div class="service-card" onclick="goToService('internship')">
      Internship
    </div>

    <div class="service-card" onclick="goToService('trainings')">
      Trainings
    </div>

    <div class="service-card" onclick="goToService('project')">
      Project
    </div>

    <div class="service-card" onclick="goToService('career')">
      Career Building
    </div>

    <div class="service-card" onclick="goToService('recruitment')">
      Sourcing & Recruitment
    </div>

    <div class="service-card" onclick="goToService('placement')">
      Placement
    </div>

  </div>
</section>

<script>
  function goToService(type) {
    window.location.href = "services.html?type=" + type;
  }
</script>

</body>
</html>
